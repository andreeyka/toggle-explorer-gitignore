name: 🐛 Bug report
description: Report a problem with the extension
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I click the status bar item, …
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a workspace with a .gitignore
        2. Click the status bar item
        3. See …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: editor
    attributes:
      label: Editor & version
      placeholder: VS Code 1.90.0 / Cursor 0.x
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 / macOS 14 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: 0.3.0
    validations:
      required: true
