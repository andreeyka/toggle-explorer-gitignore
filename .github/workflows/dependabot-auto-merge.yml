name: Dependabot auto-merge

# Automatically enables auto-merge on Dependabot PRs for patch and minor
# updates. GitHub then merges them once required checks pass. Major updates are
# left for manual review.
#
# Requirements:
#   - Settings → General → Pull Requests → "Allow auto-merge" must be enabled.
#   - For auto-merge to WAIT for CI (instead of merging immediately), add a
#     branch protection rule on `main` requiring the
#     "Lint, type-check, build & test" status check.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch & minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
